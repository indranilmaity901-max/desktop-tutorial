services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wpacs
      POSTGRES_USER: wpacs
      POSTGRES_PASSWORD: wpacs
    ports:
      - "5432:5432"
    volumes:
      - wpacs_pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql://wpacs:wpacs@postgres:5432/wpacs
      JWT_SECRET: change-this-secret
      PUBLIC_URL: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  wpacs_pgdata:
