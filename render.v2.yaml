services:
  - type: web
    name: wpacs-v2-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python run.py"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AUTO_MIGRATE
        value: true
      - key: PUBLIC_URL
        value: https://wpacs-dashboard.onrender.com
      - key: CORS_ORIGINS
        value: https://wpacs-dashboard.onrender.com
      - key: WPACS_ADMIN_USERNAME
        sync: false
      - key: WPACS_ADMIN_PASSWORD
        sync: false
      - key: WPACS_MANAGER_USERNAME
        sync: false
      - key: WPACS_MANAGER_PASSWORD
        sync: false
      - key: WPACS_AGENT_USERNAME
        sync: false
      - key: WPACS_AGENT_PASSWORD
        sync: false
      - key: WPACS_AGENT_EMPLOYEE_ID
        sync: false
      - key: WPACS_AGENT_EMPLOYEE_NAME
        sync: false
