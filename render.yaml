services:
  - type: web
    name: wpacs-dashboard
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/init_sql.py && python live_server.py"
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_URL
        value: https://dashboard.wpacs.com
